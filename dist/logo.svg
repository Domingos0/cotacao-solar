<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Icon: square frame with stylized EFF letters -->
  <!-- Outer frame -->
  <rect x="4" y="4" width="72" height="72" rx="3" stroke="#1B3A8A" stroke-width="5" fill="none"/>

  <!-- Letter E (left column + 3 bars) -->
  <rect x="16" y="16" width="5" height="48" rx="1" fill="#1B3A8A"/>
  <rect x="16" y="16" width="22" height="5" rx="1" fill="#1B3A8A"/>
  <rect x="16" y="37.5" width="18" height="5" rx="1" fill="#1B3A8A"/>
  <rect x="16" y="59" width="22" height="5" rx="1" fill="#1B3A8A"/>

  <!-- Letter F (first) -->
  <rect x="44" y="16" width="5" height="48" rx="1" fill="#1B3A8A"/>
  <rect x="44" y="16" width="20" height="5" rx="1" fill="#1B3A8A"/>
  <rect x="44" y="37.5" width="15" height="5" rx="1" fill="#1B3A8A"/>

  <!-- Text: ERNANIFF -->
  <text
    x="92" y="48"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="30"
    fill="#1B3A8A"
    letter-spacing="1"
  >ERNANIFF</text>

  <!-- Text: REPRESENTAÇÕES -->
  <text
    x="93" y="64"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#1B3A8A"
    letter-spacing="3.5"
  >REPRESENTAÇÕES</text>
</svg>
